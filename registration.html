<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toolkit | Registration</title>
<style>
:root{--primary:#ABBBD1;--light:#DCECED;--cream:#FEFDF8;--dark:#333;--muted:#666;--white:#fff;--shadow:0 10px 30px rgba(0,0,0,.08)}*{margin:0;padding:0;box-sizing:border-box}body{font-family:Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,var(--light),var(--cream));color:var(--dark)}header{position:sticky;top:0;background:#fff;box-shadow:var(--shadow);z-index:10}.nav{max-width:1200px;margin:auto;padding:14px 20px;display:flex;justify-content:space-between;align-items:center}.brand{display:flex;align-items:center;gap:12px;font-size:1.5rem;font-weight:700}.brand img{height:42px}.menu{display:flex;gap:24px;list-style:none}.menu a{text-decoration:none;color:var(--dark);font-weight:600;position:relative}.menu a:after{content:'';position:absolute;left:0;bottom:-6px;width:0;height:2px;background:var(--primary);transition:.3s}.menu a:hover:after,.active:after{width:100%}.wrap{max-width:1200px;margin:auto;min-height:calc(100vh - 74px);display:grid;grid-template-columns:1fr 1fr;gap:40px;padding:50px 20px}.hero{display:flex;flex-direction:column;justify-content:center;animation:slideIn .8s ease}.hero h1{font-size:3rem;margin-bottom:16px}.hero p{color:var(--muted);line-height:1.7}.card{background:#fff;border-radius:24px;box-shadow:var(--shadow);padding:32px;animation:fadeUp .9s ease}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.field{margin-bottom:16px}.field.full{grid-column:1/-1}label{display:block;margin-bottom:8px;font-weight:600}input{width:100%;padding:12px 14px;border:1px solid #ddd;border-radius:12px;transition:.3s}input:focus{outline:none;border-color:var(--primary);transform:translateY(-2px)}small{color:#d33;height:16px;display:block;margin-top:6px}.actions{display:flex;gap:12px;margin-top:10px}.btn{border:none;padding:12px 18px;border-radius:12px;cursor:pointer;font-weight:700;transition:.3s}.btn.primary{background:var(--primary);color:#fff}.btn.secondary{background:var(--light)}.btn:hover{transform:translateY(-3px);box-shadow:var(--shadow)}.success{color:#0a8a3c;margin-top:10px;min-height:20px}@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}@keyframes slideIn{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:none}}@media(max-width:900px){.wrap{grid-template-columns:1fr}.menu{gap:14px;font-size:.9rem}}@media(max-width:600px){.grid{grid-template-columns:1fr}.brand span{font-size:1.2rem}.menu{flex-wrap:wrap;justify-content:center}}
</style>
</head>
<body>
<header><nav class='nav'><div class='brand'><img src='Pencils_Tehnikum_logo-1.svg'><span>Toolkit</span></div><ul class='menu'><li><a href='Home.html'>Home</a></li><li><a href='search.html'>Search</a></li><li><a href='seller.html'>Seller</a></li><li><a class='active' href='registration.html'>Registration</a></li><li><a href='login.html'>Login</a></li></ul></nav></header>
<main class='wrap'>
<section class='hero'><h1>Create Seller Account</h1><p>Join Toolkit and manage your products with a clean and secure seller platform.</p></section>
<section class='card'><h2 style='margin-bottom:20px'>Registration</h2><form id='form'><div class='grid'>
<div class='field'><label>Name</label><input id='name'><small id='e1'></small></div>
<div class='field'><label>Address</label><input id='address'><small id='e2'></small></div>
<div class='field'><label>Phone</label><input id='phone'><small id='e3'></small></div>
<div class='field'><label>Email</label><input id='email'><small id='e4'></small></div>
<div class='field'><label>Username</label><input id='user'><small id='e5'></small></div>
<div class='field'><label>Password</label><input type='password' id='pass'><small id='e6'></small></div>
</div><div class='actions'><button class='btn primary' type='submit'>Register</button><button class='btn secondary' type='reset'>Reset</button></div><div class='success' id='msg'></div></form></section>
</main>
<script>
const $=id=>document.getElementById(id);const form=$('form');
function test(id,reg,msg,eid){if(!reg.test($(id).value.trim())){$(eid).textContent=msg;return false;}$(eid).textContent='';return true;}
form.addEventListener('submit',e=>{e.preventDefault();let ok=true;ok&=test('name',/^[A-Za-z\s]+$/,'Letters and spaces only','e1');ok&=test('address',/^[A-Za-z0-9\s]+$/,'Letters and numbers only','e2');ok&=test('phone',/^1[3-9]\d{9}$/,'Invalid China phone number','e3');ok&=test('email',/^[^\s@]+@[^\s@]+\.(cn|com)$/,'Use .cn or .com email','e4');ok&=test('user',/^[A-Za-z0-9]{6,}$/,'Min 6 letters/numbers','e5');ok&=test('pass',/^[A-Za-z0-9]{6,}$/,'Min 6 letters/numbers','e6');if(ok){localStorage.setItem('toolkitUsername',$('user').value.trim());$('msg').textContent='Registration successful. Redirecting to login...';setTimeout(()=>location.href='login.html',1500);}});
</script>
</body></html>
